<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>StudyFlow</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body class="dark">

    <!-- APP -->

    <div id="app">

        <!-- SIDEBAR -->

        <aside class="sidebar">

            <div class="logo">

                <div class="logo-square"></div>

                <div class="logo-text">

                    <h2>StudyFlow</h2>

                    <span>Study Better</span>

                </div>

            </div>

            <nav class="nav">

                <button class="nav-item active" data-page="dashboard">

                    <i data-lucide="layout-dashboard"></i>

                    <span>Dashboard</span>

                </button>

                <button class="nav-item" data-page="notes">

                    <i data-lucide="notebook-pen"></i>

                    <span>Notes</span>

                </button>

                <button class="nav-item" data-page="tasks">

                    <i data-lucide="check-square"></i>

                    <span>Tasks</span>

                </button>

                <button class="nav-item" data-page="calendar">

                    <i data-lucide="calendar-days"></i>

                    <span>Calendar</span>

                </button>

                <button class="nav-item" data-page="subjects">

                    <i data-lucide="book-open"></i>

                    <span>Subjects</span>

                </button>

                <button class="nav-item" data-page="flashcards">

                    <i data-lucide="layers-3"></i>

                    <span>Flashcards</span>

                </button>

                <button class="nav-item" data-page="focus">

                    <i data-lucide="timer"></i>

                    <span>Focus</span>

                </button>

                <button class="nav-item" data-page="statistics">

                    <i data-lucide="chart-column"></i>

                    <span>Statistics</span>

                </button>

            </nav>

            <div class="sidebar-bottom">

                <button class="nav-item" data-page="settings">

                    <i data-lucide="settings"></i>

                    <span>Settings</span>

                </button>

            </div>

        </aside>

        <!-- MAIN -->

        <main class="main">

            <!-- TOPBAR -->

            <header class="topbar">

                <div>

                    <h1 id="page-title">

                        Dashboard

                    </h1>

                </div>

                <div class="topbar-actions">

                    <button class="icon-btn">

                        <i data-lucide="search"></i>

                    </button>

                    <button class="icon-btn" id="themeToggle">

                        <i data-lucide="moon-star"></i>

                    </button>

                </div>

            </header>

            <!-- CONTENT -->

            <section id="content">

                <!-- DASHBOARD -->

                <div id="dashboard-page" class="page active-page">

                    <div class="welcome-card">

                        <div>

                            <h2>

                                Welcome back 👋

                            </h2>

                            <p>

                                Let's make today productive.

                            </p>

                        </div>

                    </div>

                    <div class="stats-grid">

                        <div class="stat-card">

                            <span>Today's Progress</span>

                            <h2>0%</h2>

                        </div>

                        <div class="stat-card">

                            <span>Study Time</span>

                            <h2>0h</h2>

                        </div>

                        <div class="stat-card">

                            <span>Tasks</span>

                            <h2>0</h2>

                        </div>

                        <div class="stat-card">

                            <span>Streak</span>

                            <h2>0</h2>

                        </div>

                    </div>

                </div>

            </section>

        </main>

    </div>

    <!-- Scripts -->

    <script src="js/ui/theme.js"></script>
    <script src="js/app.js"></script>

    <script>
        lucide.createIcons();
    </script>

</body>

</html>
